server:
  port: 8081

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:mysql://localhost:3306/tienda_productos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# URL del microservicio de inventario (usado por Feign)
inventory:
  service:
    url: http://localhost:8082

logging:
  level:
    com.tienda.productservice: DEBUG
    org.hibernate.SQL: DEBUG